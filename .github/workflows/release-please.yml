name: release-please

# Push lên main → release-please mở/cập nhật "release PR" (bump $plugin->release + CHANGELOG.md
# từ Conventional Commits). Merge PR đó tạo git tag + GitHub Release → trigger release.yml để
# build + đính kèm zip. Cần PAT secrets.SEPAY_RELEASE_PLEASE — vì event do GITHUB_TOKEN tạo
# KHÔNG kích hoạt workflow khác (release.yml). KHÔNG truyền release-type ở đây: manifest mode
# (release-please-config.json + .release-please-manifest.json) điều khiển.
on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.SEPAY_RELEASE_PLEASE }}
