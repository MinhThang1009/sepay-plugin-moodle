name: Moodle Plugin CI

# Chạy moodle-plugin-ci (Moodle-aware) trên runner GitHub: Moodle sạch + test DB riêng,
# KHÔNG đụng production. Khớp môi trường thật: Moodle 4.2 (MOODLE_402_STABLE) + PHP 8.2 + MariaDB.
#
# Matrix theo event (job setup-matrix quyết định):
#   - push (feedback hằng ngày): CHỈ 1 combo 8.2×4.2 -> nhanh.
#   - pull_request (trước khi merge): FULL 11 combo, phủ Moodle 4.0→5.2 × PHP 7.4→8.3.
#
# Gating: phplint / validate / savepoints / mustache / phpunit / behat = HARD (đỏ nếu lỗi).
#         phpcs / phpmd = GATING (đã sạch 0, siết để chặn regression); phpdoc / grunt = ADVISORY.
#         phpstan = GATING nhưng chỉ trên combo 8.2×4.2 (xem step bên dưới).

on:
  push:
    paths-ignore: ['**.md', '.github/ISSUE_TEMPLATE/**', '.github/PULL_REQUEST_TEMPLATE.md']
  pull_request:
    paths-ignore: ['**.md']

# Hủy run cũ còn chạy khi push mới cùng branch/PR (đỡ tốn runner, feedback nhanh hơn).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Quyết định matrix theo event: push -> 1 combo nhanh; pull_request -> full matrix.
  setup-matrix:
    runs-on: ubuntu-22.04
    outputs:
      include: ${{ steps.pick.outputs.include }}
    steps:
      - id: pick
        run: |
          # FULL phủ trọn dải hỗ trợ: Moodle 4.0→5.2 × PHP 7.4→8.3 (mỗi bản Moodle 1 dải PHP hợp lệ).
          FULL='[{"php":"7.4","moodle-branch":"MOODLE_400_STABLE","database":"mariadb"},{"php":"8.1","moodle-branch":"MOODLE_401_STABLE","database":"mariadb"},{"php":"8.0","moodle-branch":"MOODLE_402_STABLE","database":"mariadb"},{"php":"8.1","moodle-branch":"MOODLE_402_STABLE","database":"mariadb"},{"php":"8.2","moodle-branch":"MOODLE_402_STABLE","database":"mariadb"},{"php":"8.2","moodle-branch":"MOODLE_403_STABLE","database":"mariadb"},{"php":"8.3","moodle-branch":"MOODLE_404_STABLE","database":"mariadb"},{"php":"8.3","moodle-branch":"MOODLE_405_STABLE","database":"mariadb"},{"php":"8.3","moodle-branch":"MOODLE_500_STABLE","database":"mariadb"},{"php":"8.3","moodle-branch":"MOODLE_501_STABLE","database":"mariadb"},{"php":"8.3","moodle-branch":"MOODLE_502_STABLE","database":"mariadb"}]'
          # ONE = đúng combo được phpstan gating (8.2×4.2), khớp môi trường production.
          ONE='[{"php":"8.2","moodle-branch":"MOODLE_402_STABLE","database":"mariadb"}]'
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "include=$FULL" >> "$GITHUB_OUTPUT"
          else
            echo "include=$ONE" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: setup-matrix
    runs-on: ubuntu-22.04

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: true
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup-matrix.outputs.include) }}

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v7
        with:
          path: plugin

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          ini-values: max_input_vars=5000
          coverage: none
          tools: phpstan

      - name: Cache Composer
        uses: actions/cache@v6
        with:
          path: ~/.cache/composer
          key: composer-${{ runner.os }}-php${{ matrix.php }}
          restore-keys: composer-${{ runner.os }}-

      - name: Initialise moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci ci ^4
          echo $(cd ci/bin; pwd) >> $GITHUB_PATH
          echo $(cd ci/vendor/bin; pwd) >> $GITHUB_PATH
          sudo locale-gen en_AU.UTF-8
          echo "NVM_DIR=$HOME/.nvm" >> $GITHUB_ENV

      - name: Install Moodle + plugin
        run: moodle-plugin-ci install --plugin ./plugin --db-host=127.0.0.1
        env:
          DB: ${{ matrix.database }}
          MOODLE_BRANCH: ${{ matrix.moodle-branch }}

      # ---- HARD gates ----
      - name: PHP Lint
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phplint

      - name: Validate
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci validate

      - name: Check upgrade savepoints
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci savepoints

      - name: Mustache Lint
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci mustache

      - name: PHPUnit
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpunit --fail-on-warning

      - name: Behat
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci behat --profile chrome

      # PHPStan GATING đặt ngay sau hard gates, TRƯỚC advisory: verdict gating tới sớm,
      # không phải đợi phpcs/phpmd/phpdoc (chậm). Chỉ chạy combo 8.2×4.2 vì residual phpstan
      # khác nhau theo Moodle version nên gate 1 version + baseline là đủ.
      - name: PHPStan (gating, Moodle 4.2)
        if: ${{ !cancelled() && matrix.php == '8.2' && matrix.moodle-branch == 'MOODLE_402_STABLE' }}
        run: |
          M="$(cd moodle && pwd)"
          {
            echo "includes:"
            echo "    - '$M/enrol/sepay/phpstan.neon.dist'"
            echo "    - '$M/enrol/sepay/phpstan-baseline.neon'"
            echo "parameters:"
            echo "    paths: ['$M/enrol/sepay']"
            echo "    scanDirectories: ['$M/lib', '$M/enrol']"
            echo "    bootstrapFiles: ['$M/enrol/sepay/phpstan-bootstrap.php']"
            echo "    stubFiles: ['$M/enrol/sepay/phpstan-stubs.php']"
            echo "    excludePaths: { analyse: ['$M/enrol/sepay/phpstan-bootstrap.php', '$M/enrol/sepay/phpstan-stubs.php', '$M/enrol/sepay/amd'] }"
          } > "$M/phpstan-ci.neon"
          phpstan analyse -c "$M/phpstan-ci.neon" --no-progress --memory-limit=1G

      # ---- GATING style: phpcs + phpmd (đã sạch 0, siết để chặn regression) ----
      # timeout-minutes: chặn hang. phpcs khỏe ~2s; nếu vượt 5 phút là treo (đã thấy
      # 40-68 phút) -> timeout làm step đỏ (đúng: hang là sự cố cần biết).
      - name: Moodle Code Checker (phpcs)
        if: ${{ !cancelled() }}
        timeout-minutes: 5
        run: moodle-plugin-ci phpcs

      - name: PHP Mess Detector
        if: ${{ !cancelled() }}
        timeout-minutes: 5
        run: |
          M="$(cd moodle && pwd)"
          moodle-plugin-ci phpmd --rules "$M/enrol/sepay/.phpmd.xml"

      # ---- ADVISORY (continue-on-error: chưa siết vì plugin còn style cũ) ----
      - name: PHPDoc Checker
        if: ${{ !cancelled() }}
        continue-on-error: true
        timeout-minutes: 5
        run: moodle-plugin-ci phpdoc

      - name: Grunt
        if: ${{ !cancelled() }}
        continue-on-error: true
        timeout-minutes: 5
        run: moodle-plugin-ci grunt
